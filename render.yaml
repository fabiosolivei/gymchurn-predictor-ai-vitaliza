# Render Blueprint — backend FastAPI (Artefato 2). Frontend vai pro GitHub Pages.
services:
  - type: web
    name: vitaliza-churn-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FRONTEND_ORIGIN
        sync: false          # ex: https://fabiosolivei.github.io
      - key: OPENROUTER_API_KEY
        sync: false          # OBRIGATORIO p/ item 6 (explicacao+recomendacao via LLM); sem ela = fallback rule-based
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false          # opcional: gateway OTLP do Grafana Cloud -> liga a observabilidade gerenciada
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false          # ex: Authorization=Basic <base64(instanceID:token)> do Grafana Cloud
